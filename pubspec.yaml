name: sos
description: "Document everything. Stay safe out there."
version: 1.5.2+17
publish_to: 'none'

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Flutter (Google)
  camera: ^0.11.3
  go_router: ^14.8.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2

  # Community
  after_layout: ^1.2.0
  permission_handler: ^12.0.1
  flutter_contacts: ^1.1.9+2
  flutter_localized_locales: ^2.0.5
  gal: ^2.3.2
  geolocator: ^14.0.2
  provider: ^6.1.5+1
  share_plus: ^12.0.1

  # Empathetech
  efui_bios:
    path: ../efui_bios
  empathetech_flutter_ui: 
    path: ../empathetech_flutter_ui

dev_dependencies:
  dependency_validator: ^5.0.3
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/icon.png
    - assets/images/og-baddie.jpg

flutter_launcher_icons:
  image_path: assets/images/icon.png
  adaptive_icon_foreground: assets/images/icon.png
  adaptive_icon_background: "#A520DA"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  image: assets/images/icon.png
  color: "#A520DA"
  android: true
  ios: true
  web: false